<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>gemini-mini-ui</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<style>
/* ─── tokens ─────────────────────────────────────────────────────────── */
:root {
  /* dark defaults */
  --bg: #0b0b0d;
  --bg-elev-1: #141416;
  --bg-elev-2: #1a1a1d;
  --bg-hover: #1f1f23;
  --bg-active: #26222f;
  --fg: oklch(96% 0.005 280);
  --fg-muted: oklch(66% 0.008 280);
  --fg-dim: oklch(48% 0.01 280);
  --border: oklch(24% 0.01 280);
  --border-strong: oklch(32% 0.012 280);
  --accent: oklch(72% 0.16 280);
  --accent-fg: #0b0b0d;
  --accent-soft: oklch(40% 0.1 280 / 0.25);
  --accent-glow: oklch(72% 0.16 280 / 0.18);
  --danger: oklch(68% 0.18 25);
  --danger-soft: oklch(40% 0.12 25 / 0.18);
  --success: oklch(72% 0.14 155);

  --syntax-key: oklch(74% 0.13 240);
  --syntax-str: oklch(74% 0.13 150);
  --syntax-num: oklch(74% 0.13 60);
  --syntax-com: oklch(50% 0.01 280);
  --syntax-kw:  oklch(76% 0.15 320);

  --r-sm: 4px;
  --r-md: 6px;
  --r-lg: 8px;
  --r-xl: 12px;

  --font-ui: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  --shadow-pop: 0 10px 30px -10px rgb(0 0 0 / 0.6), 0 2px 6px rgb(0 0 0 / 0.4);
  --shadow-card: 0 1px 0 rgb(255 255 255 / 0.03) inset, 0 1px 3px rgb(0 0 0 / 0.4);
}

[data-theme="light"] {
  --bg: #faf9f7;
  --bg-elev-1: #ffffff;
  --bg-elev-2: #f4f3ef;
  --bg-hover: #eeede8;
  --bg-active: #eae6f5;
  --fg: oklch(22% 0.01 280);
  --fg-muted: oklch(46% 0.012 280);
  --fg-dim: oklch(62% 0.01 280);
  --border: oklch(90% 0.005 280);
  --border-strong: oklch(82% 0.008 280);
  --accent: oklch(52% 0.2 280);
  --accent-fg: #ffffff;
  --accent-soft: oklch(88% 0.06 280 / 0.6);
  --accent-glow: oklch(52% 0.2 280 / 0.15);
  --danger: oklch(54% 0.22 25);
  --danger-soft: oklch(92% 0.06 25);
  --success: oklch(52% 0.16 155);
  --syntax-key: oklch(48% 0.18 240);
  --syntax-str: oklch(44% 0.16 150);
  --syntax-num: oklch(52% 0.16 60);
  --syntax-com: oklch(62% 0.01 280);
  --syntax-kw:  oklch(48% 0.2 320);
  --shadow-pop: 0 12px 32px -12px rgb(60 40 90 / 0.18), 0 2px 6px rgb(60 40 90 / 0.08);
  --shadow-card: 0 1px 2px rgb(60 40 90 / 0.05);
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--fg);
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  transition: background-color 160ms ease, color 160ms ease;
}

button { font: inherit; color: inherit; background: transparent; border: 0; cursor: pointer; }
input, textarea { font: inherit; color: inherit; }

/* ─── shell ─────────────────────────────────────────────────────────── */
.shell {
  display: grid;
  grid-template-rows: 40px 1fr;
  height: 100vh;
  width: 100vw;
}

/* ─── topbar ────────────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 10px 0 8px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  -webkit-app-region: drag;
  user-select: none;
}
.topbar > * { -webkit-app-region: no-drag; }
.topbar .title {
  font-size: 12px;
  color: var(--fg-muted);
  font-weight: 500;
  letter-spacing: 0.01em;
}
.topbar .title .mark {
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.topbar .title .mark .glyph {
  width: 14px; height: 14px;
  background: linear-gradient(135deg, var(--accent), transparent 70%), var(--bg-elev-2);
  border-radius: 3px;
  border: 1px solid var(--border-strong);
  display: inline-block;
  position: relative;
}
.topbar .title .mark .glyph::after {
  content: "";
  position: absolute; inset: 3px;
  background: var(--accent);
  border-radius: 50%;
  opacity: 0.85;
}
.topbar .cwd {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-muted);
  padding: 3px 8px;
  border-radius: var(--r-sm);
  max-width: 360px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
}
.topbar .cwd:hover { background: var(--bg-hover); color: var(--fg); }
.topbar .cwd .lbl { color: var(--fg-dim); margin-right: 4px; }
.topbar .spacer { flex: 1; }
.quota-badge {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--fg-muted);
  padding: 3px 8px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
}
.quota-badge:hover { background: var(--bg-hover); color: var(--fg); }
.quota-badge .qb-ring {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
}
.quota-badge .qb-ring svg { display: block; }
.quota-badge .qb-ring .track {
  fill: none;
  stroke: var(--bg-elev);
  stroke-width: 2.5;
}
.quota-badge .qb-ring .fill {
  fill: none;
  stroke: var(--fg-dim);
  stroke-width: 2.5;
  stroke-linecap: round;
  opacity: 0.7;
  transition: stroke-dasharray 200ms ease;
}
.quota-badge .qb-ring[data-level="warn"] .fill { stroke: #b8862a; opacity: 0.85; }
.quota-badge .qb-ring[data-level="crit"] .fill { stroke: #b8533f; opacity: 0.95; }
.quota-badge .qb-letter {
  position: absolute;
  font-size: 8px;
  font-weight: 600;
  color: var(--fg-dim);
  line-height: 1;
  pointer-events: none;
}
.quota-popover {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  z-index: 50;
  min-width: 240px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  padding: 8px 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg);
}
.quota-popover .row {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 4px 0;
}
.quota-popover .row + .row { border-top: 1px solid var(--border); }
.quota-popover .bar {
  height: 6px;
  background: var(--bg-elev);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}
.quota-popover .bar > i {
  display: block; height: 100%;
  background: var(--fg-dim);
  border-radius: 3px;
  opacity: 0.7;
}
.quota-popover .bar > i[data-level="warn"] { background: #b8862a; opacity: 0.85; }
.quota-popover .bar > i[data-level="crit"] { background: #b8533f; opacity: 0.95; }
.quota-popover .reset { color: var(--fg-dim); font-size: 10px; }
.quota-popover .label { color: var(--fg-muted); }
.quota-popover .empty { color: var(--fg-dim); padding: 4px 0; }

.icon-btn {
  width: 26px; height: 26px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--r-md);
  color: var(--fg-muted);
  transition: background 120ms ease, color 120ms ease;
}
.icon-btn:hover { background: var(--bg-hover); color: var(--fg); }
.icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.icon-btn.active { background: var(--bg-active); color: var(--fg); }

/* ─── layout ────────────────────────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: var(--sidebar-w, 240px) 1fr var(--artifact-w, 0px);
  height: 100%;
  min-height: 0;
  transition: grid-template-columns 200ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
.layout[data-sidebar="collapsed"] { --sidebar-w: 44px; }
.layout[data-artifact="open"] { --artifact-w: 320px; }
.layout.layout--resizing { transition: none; user-select: none; }

.pane {
  min-height: 0;
  min-width: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--bg);
  position: relative;
}
.pane:last-child { border-right: 0; border-left: 1px solid var(--border); }

/* ─── resize handles ─────────────────────────────────────────────── */
.resize-handle {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 4px;
  z-index: 20;
  cursor: col-resize;
  touch-action: none;
  background: transparent;
}
.resize-handle--right { right: -2px; }
.resize-handle--left  { left: -2px; }
.resize-handle::after {
  content: "";
  position: absolute;
  top: 0;
  bottom: 0;
  left: 50%;
  width: 1px;
  transform: translateX(-0.5px);
  background: var(--accent);
  opacity: 0;
  transition: opacity 120ms ease;
  pointer-events: none;
}
.resize-handle:hover::after,
.resize-handle.dragging::after { opacity: 0.7; }
.resize-handle.dragging::after { opacity: 1; }

/* ─── sidebar ───────────────────────────────────────────────────────── */
.sidebar {
  background: linear-gradient(180deg, var(--bg) 0%, color-mix(in oklab, var(--bg) 85%, var(--bg-elev-2)) 100%);
}
.sidebar-head {
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  border-bottom: 1px solid var(--border);
}
.new-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 7px 10px;
  border-radius: var(--r-md);
  background: var(--accent);
  color: var(--accent-fg);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.01em;
  box-shadow: 0 1px 0 rgb(255 255 255 / 0.15) inset, 0 4px 12px var(--accent-glow);
  transition: filter 120ms ease, transform 120ms ease;
}
.new-btn:hover { filter: brightness(1.06); }
.new-btn:active { transform: translateY(1px); }
.new-btn.icon-only { padding: 7px; }

.search {
  position: relative;
}
.search input {
  width: 100%;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 5px 8px 5px 26px;
  font-size: 12px;
  outline: none;
  transition: border-color 120ms ease, background 120ms ease;
}
.search input:focus { border-color: var(--accent); background: var(--bg-elev-1); }
.search input::placeholder { color: var(--fg-dim); }
.search .search-icon {
  position: absolute; left: 7px; top: 50%; transform: translateY(-50%);
  color: var(--fg-dim);
  pointer-events: none;
}

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 6px 10px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.dir-group { margin: 0 0 2px; }
.dir-head {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  border-radius: var(--r-sm);
  color: var(--fg-muted);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
  text-align: left;
}
.dir-head:hover { background: var(--bg-hover); color: var(--fg); }
.dir-head .dir-caret {
  display: inline-flex;
  transition: transform 150ms ease;
  color: var(--fg-dim);
}
.dir-head[data-collapsed="true"] .dir-caret { transform: rotate(-90deg); }
.dir-head .dir-path {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dir-head .dir-count {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  color: var(--fg-dim);
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  padding: 0 5px;
  border-radius: 100px;
  min-width: 18px;
  text-align: center;
}
.dir-items {
  display: flex;
  flex-direction: column;
  gap: 0;
  margin-left: 2px;
  padding-left: 8px;
  border-left: 1px dashed var(--border);
}

.title-text {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  line-height: 1.3;
}
.session-list::-webkit-scrollbar { width: 8px; }
.session-list::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
.session-list::-webkit-scrollbar-track { background: transparent; }

.sec-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-dim);
  padding: 10px 8px 4px;
}

.session-row {
  position: relative;
  display: block;
  padding: 3px 8px 3px;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: background 100ms ease;
  border: 1px solid transparent;
}
.session-row:hover { background: var(--bg-hover); }
.session-row:hover .row-menu { opacity: 1; }
.session-row:hover .meta { opacity: 0; }
.session-row.active {
  background: var(--bg-active);
  border-color: color-mix(in oklab, var(--accent) 25%, transparent);
}
.session-row.active::before {
  content: "";
  position: absolute;
  left: -1px; top: 15%; bottom: 15%;
  width: 2px;
  background: var(--accent);
  border-radius: 1px;
}
.session-row .title {
  font-size: 12px;
  font-weight: 500;
  color: var(--fg);
  display: flex;
  align-items: center;
  gap: 6px;
  padding-right: 22px;
  min-width: 0;
}
.session-row .title .streaming-dot { flex-shrink: 0; }
.session-row.editing { cursor: text; }
.session-row .title-edit {
  flex: 1;
  min-width: 0;
  font: inherit;
  color: var(--fg);
  background: var(--bg);
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 2px 6px;
  outline: none;
  box-shadow: 0 0 0 2px var(--accent-glow, rgba(99, 102, 241, 0.18));
}
.session-row .meta {
  flex-shrink: 0;
  font-size: 10px;
  color: var(--fg-dim);
  font-variant-numeric: tabular-nums;
  transition: opacity 100ms ease;
}
.row-menu-wrap {
  position: absolute;
  top: 50%;
  right: 4px;
  transform: translateY(-50%);
}
.row-menu {
  opacity: 0;
  transition: opacity 120ms ease;
  border-radius: var(--r-sm);
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  border: 0;
  background: transparent;
  color: var(--fg-muted);
  cursor: pointer;
}
.row-menu:hover { background: var(--bg-elev-1); color: var(--fg); }
/* Keep the menu button visible while its popover is open. */
.row-menu-wrap:has(.row-menu-pop) .row-menu { opacity: 1; }
.row-menu-pop {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  z-index: 30;
  min-width: 130px;
  padding: 4px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  display: flex;
  flex-direction: column;
}
.row-menu-pop button {
  text-align: left;
  padding: 5px 10px;
  font-size: 12px;
  color: var(--fg);
  background: transparent;
  border: 0;
  border-radius: 4px;
  cursor: pointer;
}
.row-menu-pop button:hover { background: var(--bg-hover); }
.row-menu-pop button.danger { color: var(--danger); }
.row-menu-pop button.danger:hover { background: rgba(248, 113, 113, 0.10); }

.streaming-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 0 var(--accent-glow);
  animation: pulse 1.6s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); opacity: 0.7; }
  50%      { box-shadow: 0 0 0 5px transparent; opacity: 1; }
}

/* icon rail (collapsed sidebar) */
.rail {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 0;
}
.rail .rail-item {
  width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--r-md);
  color: var(--fg-muted);
  position: relative;
  cursor: pointer;
}
.rail .rail-item:hover { background: var(--bg-hover); color: var(--fg); }
.rail .rail-item.active { background: var(--bg-active); color: var(--fg); }
.rail .rail-item .dot {
  position: absolute;
  top: 4px; right: 4px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
}
.rail .divider {
  width: 60%; height: 1px;
  background: var(--border);
  margin: 6px 0;
}

/* ─── chat pane ────────────────────────────────────────────────────── */
.chat {
  background: var(--bg);
  position: relative;
}
.chat-header {
  padding: 10px 20px 8px;
  border-bottom: 1px solid var(--border);
  background: color-mix(in oklab, var(--bg) 80%, var(--bg-elev-2));
  display: flex;
  align-items: center;
  gap: 12px;
}
.chat-header .h-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--fg);
}
.chat-header .h-meta {
  font-size: 11px;
  color: var(--fg-muted);
  font-family: var(--font-mono);
  display: flex;
  gap: 10px;
  align-items: center;
}
.chat-header .h-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--fg-dim); }
.h-info-wrap { position: relative; display: flex; align-items: center; }
.h-info-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 6px;
  border: 1px solid transparent; background: transparent;
  color: var(--fg-muted); cursor: pointer;
}
.h-info-btn:hover { background: var(--bg-elev-2); color: var(--fg); border-color: var(--border); }
.h-info-pop {
  position: absolute; top: calc(100% + 6px); right: 0; z-index: 20;
  min-width: 280px; max-width: 420px;
  padding: 10px 12px;
  background: var(--bg-elev-2); border: 1px solid var(--border);
  border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  font-size: 12px; color: var(--fg);
}
.h-info-label {
  font-size: 11px; color: var(--fg-muted);
  text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px;
}
.h-info-path {
  font-family: var(--font-mono); font-size: 11.5px;
  word-break: break-all; user-select: all;
  padding: 6px 8px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 6px; color: var(--fg);
}
.h-info-copy {
  margin-top: 8px; display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 8px; font-size: 11px;
  background: transparent; color: var(--fg-muted);
  border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
}
.h-info-copy:hover { color: var(--fg); background: var(--bg-elev-2); }
.h-info-empty { color: var(--fg-muted); font-size: 11.5px; }

.msg-log {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px 24px;
  scroll-behavior: smooth;
  /* Reserve room for the scrollbar so bubble width doesn't shift by ~10px
     when the log grows past the viewport. */
  scrollbar-gutter: stable;
}
.msg-log::-webkit-scrollbar { width: 10px; }
.msg-log::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 5px; }
.msg-log::-webkit-scrollbar-track { background: transparent; }

.msg-group { max-width: 820px; margin: 0 auto; }

.msg {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 6px;
}
.msg.system { align-items: stretch; }
.msg.system .bubble {
  max-width: none;
  width: 100%;
}

.bubble {
  flex: 1;
  min-width: 0;
  padding: 7px 11px;
  border-radius: var(--r-md);
  font-size: 13px;
  line-height: 1.5;
  word-wrap: break-word;
  position: relative;
}
.msg.user .bubble {
  background: var(--accent-soft);
  color: var(--fg);
  border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
}
.msg.assistant .bubble {
  background: var(--bg-elev-1);
  border: 1px solid var(--border);
}
.msg.assistant .bubble.error {
  background: var(--danger-soft);
  border-color: color-mix(in oklab, var(--danger) 40%, transparent);
}

.msg .meta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding-top: 6px;
  font-size: 10.5px;
  color: var(--fg-dim);
  flex-shrink: 0;
  white-space: nowrap;
  /* Fixed right-side lane so every row's timestamp lands in the same column
     regardless of which action buttons (copy / fork / resend) are present.
     Timestamp packs at the start (next to the bubble); hover-revealed actions
     extend further right within the reserved lane. */
  width: 150px;
  justify-content: flex-start;
}
.msg .meta .meta-who {
  display: inline-flex;
  color: var(--fg-muted);
}
.msg.user .meta .meta-who { color: var(--accent); }
.msg .meta .meta-time { font-variant-numeric: tabular-nums; }
.msg .meta .meta-streaming { color: var(--accent); margin-left: 2px; }

.msg .meta .meta-actions {
  display: inline-flex;
  gap: 2px;
  opacity: 0;
  transition: opacity 120ms ease;
  margin-left: 2px;
}
.msg:hover .meta .meta-actions { opacity: 1; }

.meta-btn {
  padding: 2px 4px;
  border-radius: var(--r-sm);
  color: var(--fg-dim);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 120ms ease, color 120ms ease;
}
.meta-btn:hover { background: var(--bg-hover); color: var(--fg); }
.meta-btn:disabled { opacity: 0.4; cursor: default; }

/* markdown */
.md p { margin: 0 0 8px; }
.md p:last-child { margin-bottom: 0; }
.md > *:first-child { margin-top: 0; }
.md > *:last-child { margin-bottom: 0; }
.md strong { font-weight: 600; color: var(--fg); }
.md em { font-style: italic; }
.md ul, .md ol { margin: 0 0 8px; padding-left: 20px; }
.md li { margin-bottom: 2px; }
.md code.inline {
  font-family: var(--font-mono);
  font-size: 11.5px;
  background: var(--bg-elev-2);
  padding: 1px 5px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  color: oklch(80% 0.09 60);
}
.md a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
.md h1, .md h2, .md h3 { margin: 12px 0 6px; font-weight: 600; }
.md h1 { font-size: 16px; }
.md h2 { font-size: 14px; }
.md h3 { font-size: 13px; }
.md .md-math-display {
  margin: 10px 0;
  padding: 4px 2px;
  overflow-x: auto;
  overflow-y: hidden;
  text-align: center;
}
.md .md-math-display .katex-display { margin: 0; }
.md .md-math-inline { white-space: nowrap; }
.md .md-math-error {
  color: var(--danger);
  font-family: var(--font-mono);
  font-size: 11.5px;
}

/* markdown tables */
.md-table-wrap {
  width: 100%;
  overflow-x: auto;
  margin: 12px 0;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
}
.md table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12.5px;
}
.md th, .md td {
  padding: 8px 12px;
  border: 1px solid var(--border);
  text-align: left;
}
.md th {
  background: var(--bg-elev-2);
  font-weight: 600;
  color: var(--fg-muted);
}
.md tr:nth-child(even) {
  background: rgba(255, 255, 255, 0.02);
}

.code-block {
  position: relative;
  margin: 6px 0;
  border-radius: var(--r-sm);
  background: var(--bg);
  border: 1px solid var(--border);
  overflow: hidden;
}
[data-theme="light"] .code-block { background: #f4f3ef; }
.code-block .cb-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 8px 2px 10px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-dim);
  letter-spacing: 0.02em;
  text-transform: lowercase;
}
.code-block pre {
  margin: 0;
  padding: 10px 12px;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 11.5px;
  line-height: 1.6;
  color: oklch(88% 0.01 280);
}
[data-theme="light"] .code-block pre { color: oklch(28% 0.01 280); }
.code-block .copy {
  font-size: 10px;
  color: var(--fg-muted);
  padding: 2px 6px;
  border-radius: var(--r-sm);
  transition: background 120ms ease, color 120ms ease;
}
.code-block .copy:hover { background: var(--bg-hover); color: var(--fg); }

.tok-key { color: var(--syntax-key); }
.tok-str { color: var(--syntax-str); }
.tok-num { color: var(--syntax-num); }
.tok-com { color: var(--syntax-com); font-style: italic; }
.tok-kw  { color: var(--syntax-kw); }
.tok-pun { color: var(--fg-muted); }

/* streaming caret */
.caret {
  display: inline-block;
  width: 7px;
  height: 14px;
  background: var(--accent);
  vertical-align: -2px;
  margin-left: 1px;
  border-radius: 1px;
  animation: blink 1s steps(2, end) infinite;
}
@keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0.1; } }

.streaming-line {
  position: relative;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--accent-glow) 30%,
    transparent 60%);
  background-size: 200% 100%;
  background-repeat: no-repeat;
  animation: shimmer 2.2s linear infinite;
}
@keyframes shimmer {
  0% { background-position: -50% 0; }
  100% { background-position: 150% 0; }
}

/* tool-group: collapsible run of consecutive tool calls */
.tool-group {
  max-width: 820px;
  margin: 0 auto 6px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
}
.tool-group .tool-call { margin: 0; }
.tg-more {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-dim);
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 0 7px;
  line-height: 15px;
  cursor: pointer;
}
.tg-more:hover { color: var(--fg); background: var(--bg-hover); }
.tg-collapse {
  align-self: flex-start;
  font-family: var(--font-ui);
  font-size: 10.5px;
  color: var(--fg-dim);
  padding: 1px 8px;
  border-radius: 999px;
  background: transparent;
  cursor: pointer;
}
.tg-collapse:hover { color: var(--fg-muted); background: var(--bg-hover); }

/* tool-call row */
.tool-call {
  margin: 0;
  max-width: 100%;
  width: fit-content;
  min-width: 0;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  background: var(--bg-elev-1);
  overflow: hidden;
}
.tool-call .tc-head {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--fg-muted);
  cursor: pointer;
  user-select: none;
}
.tool-call .tc-head:hover { background: var(--bg-hover); }
.tool-call .tc-head .tool-name { color: var(--fg); font-weight: 500; user-select: text; }
.tool-call .tc-head .tc-inline-arg {
  color: var(--fg-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 420px;
}
.tool-call .tc-head .tok-key,
.tool-call .tc-head .tok-pun,
.tool-call .tc-head .tok-str { user-select: text; }
.tool-call .tc-head .duration {
  font-size: 10.5px;
  color: var(--fg-dim);
  margin-left: 4px;
}
.tool-call .tc-head .caret-icon {
  color: var(--fg-dim);
  transition: transform 150ms ease;
}
.tool-call[data-open="true"] .caret-icon { transform: rotate(90deg); }

.tool-call .tc-body {
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.tool-call .tc-body > div { padding: 8px 10px; }
.tool-call .tc-body > div + div { border-top: 1px solid var(--border); }
.tool-call .tc-body .sec-h {
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-dim);
  margin-bottom: 4px;
}
.tool-call pre {
  margin: 0;
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--fg);
  max-height: 180px;
  overflow-y: auto;
}

/* file diff result (write_file / replace) */
.file-diff {
  font-family: var(--font-mono);
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.file-diff .fd-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  background: var(--bg-elev-2);
  border-bottom: 1px solid var(--border);
  color: var(--fg-muted);
}
.file-diff .fd-path { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-diff .fd-stat { display: inline-flex; gap: 6px; font-size: 10.5px; }
.file-diff .fd-new { color: var(--fg-dim); border: 1px solid var(--border); padding: 0 4px; border-radius: 3px; font-size: 9.5px; }
.file-diff .fd-add { color: #4ade80; }
.file-diff .fd-del { color: #f87171; }
.file-diff .fd-body {
  max-height: 280px;
  overflow: auto;
  padding: 4px 0;
}
.file-diff .fd-line {
  padding: 0 8px;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--fg);
}
.file-diff .fd-add-line { background: rgba(74, 222, 128, 0.10); color: #86efac; }
.file-diff .fd-del-line { background: rgba(248, 113, 113, 0.10); color: #fca5a5; }
.file-diff .fd-toggle {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  background: var(--bg-elev-1);
}
.file-diff .fd-toggle-btn {
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-dim);
  background: transparent;
  border: 0;
  padding: 2px 8px;
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
}
.file-diff .fd-toggle-btn + .fd-toggle-btn { border-left: 1px solid var(--border); }
.file-diff .fd-toggle-btn:hover { color: var(--fg); }
.file-diff .fd-toggle-btn.active { background: var(--bg-elev-2); color: var(--fg); }
.file-diff .fd-raw {
  margin: 0;
  padding: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 280px;
  overflow: auto;
}

.result-empty {
  color: var(--fg-dim);
  font-style: italic;
}

/* shell command result */
.shell-result {
  font-family: var(--font-mono);
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.shell-result .shell-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 8px;
  background: var(--bg-elev-2);
  border-bottom: 1px solid var(--border);
}
.shell-result .shell-head + .shell-body { border-top: 0; }
.shell-result .shell-label {
  font-family: var(--font-ui);
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-dim);
}
.shell-result .shell-label.err { color: #f87171; }
.shell-result .shell-exit {
  margin-left: auto;
  font-family: var(--font-ui);
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border: 1px solid var(--border);
  padding: 1px 6px;
  border-radius: 3px;
  color: var(--fg-dim);
}
.shell-result .shell-exit.ok { color: #4ade80; border-color: rgba(74, 222, 128, 0.4); }
.shell-result .shell-exit.fail { color: #f87171; border-color: rgba(248, 113, 113, 0.4); }
.shell-result .shell-body {
  margin: 0;
  padding: 6px 8px;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 240px;
  overflow: auto;
  color: var(--fg);
}
.shell-result .shell-body.err { color: #fca5a5; background: rgba(248, 113, 113, 0.06); }
.shell-result .shell-extras {
  margin: 0;
  padding: 4px 8px;
  border-top: 1px solid var(--border);
  background: var(--bg-elev-1);
  color: var(--fg-dim);
  font-size: 10.5px;
  white-space: pre-wrap;
}

/* collapsible long output */
.collapsible {
  display: flex;
  flex-direction: column;
}
.collapsible .collapsible-body {
  margin: 0;
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--fg);
  max-height: none;
}
.collapsible .collapsible-toggle {
  align-self: flex-start;
  margin-top: 4px;
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-muted);
  background: var(--bg-elev-1);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 4px;
  cursor: pointer;
}
.collapsible .collapsible-toggle:hover { background: var(--bg-hover); color: var(--fg); }

/* retry inline */
.retry-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 8px;
  margin-top: 6px;
  border-radius: var(--r-sm);
  background: var(--bg-elev-1);
  border: 1px solid var(--border);
  color: var(--fg);
  font-size: 11px;
  transition: background 120ms ease, border-color 120ms ease;
}
.retry-btn:hover { background: var(--bg-hover); border-color: var(--border-strong); }

/* typed error bubble */
.err-title { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.err-kind {
  color: var(--danger);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0.01em;
}
.err-body {
  color: var(--fg);
  font-size: 12.5px;
  word-break: break-word;
  white-space: pre-wrap;
}

/* jump-to-latest pill */
.jump-pill {
  position: absolute;
  left: 50%;
  bottom: 108px;
  transform: translateX(-50%);
  background: var(--bg-elev-1);
  border: 1px solid var(--border-strong);
  box-shadow: var(--shadow-pop);
  color: var(--fg);
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 100px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 150ms ease, transform 150ms ease;
}
.jump-pill.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(-2px); }

/* empty states */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  text-align: center;
  color: var(--fg-muted);
}
.empty .glyph-lg {
  width: 48px; height: 48px;
  border-radius: 10px;
  background: linear-gradient(135deg, color-mix(in oklab, var(--accent) 30%, transparent), var(--bg-elev-2));
  border: 1px solid var(--border);
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
}
.empty h3 { font-size: 14px; margin: 0 0 4px; color: var(--fg); font-weight: 600; }
.empty p { font-size: 12px; margin: 0; max-width: 260px; }
.empty .chips {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 14px; justify-content: center;
}
.empty .chip {
  font-size: 11.5px;
  padding: 5px 10px;
  border-radius: 100px;
  background: var(--bg-elev-1);
  border: 1px solid var(--border);
  color: var(--fg);
  transition: background 120ms ease, border-color 120ms ease;
}
.empty .chip:hover { background: var(--bg-hover); border-color: var(--accent); }

/* ─── composer ────────────────────────────────────────────────────── */
.composer-wrap {
  padding: 10px 24px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}
.composer {
  max-width: 820px;
  margin: 0 auto;
  background: var(--bg-elev-1);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  transition: border-color 120ms ease, box-shadow 120ms ease;
  display: flex;
  flex-direction: column;
}
.composer:focus-within {
  border-color: color-mix(in oklab, var(--accent) 55%, var(--border));
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.composer textarea {
  background: transparent;
  border: 0;
  outline: 0;
  resize: none;
  padding: 10px 12px 4px;
  min-height: 38px;
  max-height: 180px;
  font-size: 13px;
  line-height: 1.5;
  color: var(--fg);
}
.composer textarea::placeholder { color: var(--fg-dim); }
.composer-actions {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 6px 6px 8px;
}
.composer-actions .left { display: flex; align-items: center; gap: 4px; }
.model-picker { position: relative; display: inline-flex; }
.model-btn {
  display: inline-flex; align-items: center; gap: 4px;
  height: 26px; padding: 0 8px;
  border-radius: var(--r-md);
  background: transparent;
  color: var(--fg-muted);
  font: inherit; font-size: 12px;
  transition: background 120ms ease, color 120ms ease;
  cursor: pointer;
}
.model-btn:hover:not(:disabled) { background: var(--bg-hover); color: var(--fg); }
.model-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.model-btn-text { font-weight: 500; }
.model-pop {
  position: absolute; bottom: calc(100% + 6px); left: 0; z-index: 30;
  min-width: 220px;
  padding: 4px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
.model-opt {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  width: 100%;
  padding: 6px 8px;
  border-radius: 6px;
  font: inherit; font-size: 12px;
  color: var(--fg);
  background: transparent;
  text-align: left;
  cursor: pointer;
}
.model-opt:hover { background: var(--bg-hover); }
.model-opt.on { color: var(--accent); }

.resend-menu { position: relative; display: inline-flex; }
.resend-pop {
  position: absolute; bottom: calc(100% + 4px); left: 0; z-index: 30;
  min-width: 220px;
  padding: 4px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.18);
}
.resend-head {
  font-size: 9.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-dim);
  padding: 6px 8px 4px;
}
.resend-opt {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  width: 100%;
  padding: 6px 8px;
  border-radius: 6px;
  font: inherit; font-size: 12px;
  color: var(--fg);
  background: transparent;
  text-align: left;
  cursor: pointer;
}
.resend-opt:hover { background: var(--bg-hover); }
.resend-opt.on { color: var(--accent); }
.resend-current {
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-dim);
  border: 1px solid var(--border);
  padding: 0 5px;
  border-radius: 3px;
}
.composer-actions .hint {
  margin-left: auto;
  font-size: 10.5px;
  color: var(--fg-dim);
  padding-right: 6px;
  font-family: var(--font-mono);
}
.kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0 4px;
  color: var(--fg-muted);
}
.send-btn {
  width: 28px; height: 28px;
  border-radius: var(--r-md);
  background: var(--accent);
  color: var(--accent-fg);
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 6px var(--accent-glow);
  transition: filter 120ms ease, transform 120ms ease, background 120ms ease;
}
.send-btn:hover { filter: brightness(1.08); }
.send-btn:disabled { background: var(--bg-elev-2); color: var(--fg-dim); box-shadow: none; cursor: not-allowed; }
.send-btn.stop { background: var(--danger); color: #fff; }

/* ─── artifact pane ─────────────────────────────────────────────── */
.artifact {
  background: var(--bg-elev-2);
  overflow: hidden;
}
.artifact-head {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--fg-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
}

/* ─── debug drawer ──────────────────────────────────────────────── */
.debug-drawer {
  position: absolute;
  top: 0; right: 0; bottom: 0;
  width: 320px;
  z-index: 30;
  background: var(--bg-elev-1);
  border-left: 1px solid var(--border-strong);
  box-shadow: -10px 0 30px -12px rgba(0, 0, 0, 0.35);

.debug-drawer .dd-head {

.debug-drawer .dd-body {

.debug-drawer .dd-empty {

}

.dd-event {

}
.dd-event[data-open="true"] .dd-evt-caret { transform: rotate(90deg); }
.dd-event .dd-evt-kind {

.dd-event .dd-evt-summary {

}
.dd-event .dd-evt-body {

}
.dd-event .dd-evt-body pre {

.dd-req-sec-caret {

.dd-req-sec-title {

.dd-req-sec-body {

.dd-req-pre {

}
.dd-req-turn-role.role-function,
.dd-req-turn-role.role-tool {

.dd-req-turn-body {

.dd-req-full-btn {

}
.dd-full-head {

  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev-2);
  font-size: 12px;
  color: var(--fg);
}
.dd-full-head > span { flex: 1; }
.dd-full-body {
  flex: 1;
  margin: 0;
  padding: 10px 12px;
  overflow: auto;
  font-family: var(--font-mono);
  font-size: 11px;
  line-height: 1.5;
  white-space: pre-wrap;

  background: var(--bg);
}

/* ─── tweaks panel ──────────────────────────────────────────────── */
.tweaks {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 240px;
  background: var(--bg-elev-1);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-pop);
  z-index: 1000;
  font-size: 12px;
  overflow: hidden;
  transform-origin: bottom right;
  animation: pop-in 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes pop-in {
  from { opacity: 0; transform: translateY(6px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.tweaks-head {
  padding: 8px 10px 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev-2);
  font-weight: 600;
  letter-spacing: 0.02em;
}
.tweaks-body { padding: 6px 4px; }
.tweak-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border-radius: var(--r-sm);
  transition: background 120ms ease;
}
.tweak-row:hover { background: var(--bg-hover); }
.tweak-row label { color: var(--fg); }
.tweak-row .sub { color: var(--fg-dim); font-size: 10.5px; }

/* switch */
.switch {
  position: relative;
  width: 28px; height: 16px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: 100px;
  transition: background 120ms ease, border-color 120ms ease;
  flex-shrink: 0;
}
.switch::after {
  content: "";
  position: absolute;
  top: 1px; left: 1px;
  width: 12px; height: 12px;
  background: var(--fg-muted);
  border-radius: 50%;
  transition: transform 160ms cubic-bezier(0.2, 0.8, 0.2, 1), background 120ms ease;
}
.switch[data-on="true"] {
  background: var(--accent);
  border-color: var(--accent);
}
.switch[data-on="true"]::after { transform: translateX(12px); background: #fff; }

/* seg */
.seg {
  display: inline-flex;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 1px;
}
.seg button {
  font-size: 10.5px;
  padding: 2px 7px;
  border-radius: 3px;
  color: var(--fg-muted);
}
.seg button.on { background: var(--bg-elev-1); color: var(--fg); box-shadow: 0 1px 2px rgb(0 0 0 / 0.2); }

/* toast */
.toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--bg-elev-1);
  color: var(--fg);
  border: 1px solid var(--border-strong);
  padding: 6px 12px;
  border-radius: 100px;
  font-size: 11.5px;
  box-shadow: var(--shadow-pop);
  opacity: 0;
  pointer-events: none;
  transition: opacity 160ms ease, transform 160ms ease;
  z-index: 2000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── directory picker ─────────────────────────────────────────── */
.dp-backdrop {
  position: fixed; inset: 0;
  background: rgb(0 0 0 / 0.45);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 14vh;
  z-index: 1500;
  animation: pop-in 120ms ease;
}
.dp-card {
  width: min(520px, 92vw);
  background: var(--bg-elev-1);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-pop);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.dp-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev-2);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-muted);
  font-weight: 600;
}
.dp-input {
  margin: 10px 12px 6px;
  padding: 8px 10px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--fg);
  font-size: 13px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  outline: none;
}
.dp-input:focus { border-color: var(--accent); }
.dp-list {
  max-height: 260px;
  overflow-y: auto;
  padding: 4px 6px 6px;
}
.dp-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 6px 10px;
  border-radius: var(--r-sm);
  color: var(--fg);
  font-size: 12px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dp-item:hover, .dp-item.on { background: var(--bg-hover); }
.dp-empty { padding: 10px; color: var(--fg-dim); font-size: 12px; }
.dp-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: var(--bg-elev-2);
}
.dp-hint { font-size: 10.5px; color: var(--fg-dim); }
.dp-actions { display: flex; gap: 6px; }
.dp-btn {
  padding: 5px 12px;
  border-radius: var(--r-sm);
  background: var(--bg-elev-1);
  border: 1px solid var(--border);
  color: var(--fg);
  font-size: 12px;
}
.dp-btn:hover { background: var(--bg-hover); }
.dp-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.dp-btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }

/* ─── approval modal ───────────────────────────────────────────── */
.approval-backdrop {
  position: fixed; inset: 0;
  background: rgb(0 0 0 / 0.45);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 12vh;
  z-index: 1800;
  animation: pop-in 120ms ease;
}
.approval-card {
  width: min(620px, 94vw);
  background: var(--bg-elev-1);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-pop);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.approval-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-elev-2);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-muted);
  font-weight: 600;
  display: flex; align-items: center; gap: 8px;
}
.approval-head .warn { color: var(--danger); }
.approval-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; }
.approval-tool {
  display: flex; align-items: baseline; gap: 8px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 13px;
}
.approval-tool .tool-name { color: var(--accent); font-weight: 600; }
.approval-args {
  display: flex; flex-direction: column; gap: 8px;
  max-height: 300px; overflow-y: auto;
  margin: 0;
}
.approval-arg-key {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 11px;
  color: var(--fg-dim);
  margin-bottom: 4px;
}
.approval-arg-val {
  margin: 0;
  padding: 8px 10px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-all;
}
.approval-foot {
  display: flex; align-items: center; justify-content: flex-end; gap: 6px;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: var(--bg-elev-2);
}
.approval-btn {
  padding: 5px 14px;
  border-radius: var(--r-sm);
  background: var(--bg-elev-1);
  border: 1px solid var(--border);
  color: var(--fg);
  font-size: 12px;
  cursor: pointer;
}
.approval-btn:hover { background: var(--bg-hover); }
.approval-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.approval-btn.primary:disabled { opacity: 0.5; cursor: not-allowed; }

/* badge shown on tool-call rows while awaiting approval */
.tool-call .awaiting {
  margin-left: 6px;
  padding: 1px 6px;
  border-radius: 999px;
  font-size: 10.5px;
  background: rgb(255 200 0 / 0.15);
  border: 1px solid rgb(255 200 0 / 0.3);
  color: #e6b400;
  letter-spacing: 0.02em;
}

/* ─── command palette ──────────────────────────────────────────── */
.cmdk-backdrop {
  position: fixed; inset: 0;
  background: rgb(0 0 0 / 0.45);
  display: flex; align-items: flex-start; justify-content: center;
  padding-top: 14vh;
  z-index: 1900;
  animation: pop-in 120ms ease;
}
.cmdk-card {
  width: min(520px, 92vw);
  background: var(--bg-elev-1);
  border: 1px solid var(--border-strong);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-pop);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.cmdk-input {
  margin: 10px 12px 6px;
  padding: 9px 12px;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--fg);
  font-size: 14px;
  outline: none;
}
.cmdk-input:focus { border-color: var(--accent); }
.cmdk-list {
  max-height: 320px;
  overflow-y: auto;
  padding: 4px 6px 6px;
}
.cmdk-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  width: 100%;
  text-align: left;
  padding: 7px 10px;
  border-radius: var(--r-sm);
  color: var(--fg);
  font-size: 13px;
  background: transparent;
  border: 0;
  cursor: pointer;
}
.cmdk-item.on {
  background: var(--bg-hover);
  box-shadow: inset 2px 0 0 var(--accent);
}
.cmdk-item.disabled { opacity: 0.5; cursor: not-allowed; }
.cmdk-item.selected .cmdk-label { color: var(--accent); }
.cmdk-trail { color: var(--fg-dim); font-size: 11.5px; }
.cmdk-empty { padding: 10px; color: var(--fg-dim); font-size: 12px; }
.cmdk-foot {
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: var(--bg-elev-2);
}
.cmdk-hint { font-size: 10.5px; color: var(--fg-dim); }

</style>
</head>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
